##################################
# BACKEND
##################################
backend = "glx";
vsync = true;
use-damage = true;
log-level = "warn";


##################################
# OPACITY
##################################
detect-client-opacity = true;
use-ewmh-active-win = true;
opacity-rule = [
  "90:class_g = 'st-256color' && focused",
  "75:class_g = 'st-256color' && !focused"
];


##################################
# ROUNDED CORNERS
##################################
#corner-radius = 15;


##################################
# BLUR
##################################
blur: {
  method = "dual_kawase";
  size = 5;
  strength = 1;
};
blur-background = true;
blur-background-fixed = true;
blur-background-exclude = [
  "class_g = 'slop'"
];


##################################
# SHADOWS
##################################
shadow = true;
shadow-radius = 1;
shadow-opacity = 0.6;
shadow-offset-x = 0;
shadow-offset-y = 0;
shadow-color = "#393943";


##################################
# FADING
##################################
fading = true;
fade-in-step = 0.03;
fade-out-step = 0.03;
fade-delta = 3;
